# NAS 백본 (D2) — n8n + Postgres(pgvector) + LiteLLM + Uptime Kuma
# ⚠️ 검증(설치 시): 모든 image 태그를 "그 시점 현재 안정판"으로 핀. latest 금지.
#    지식 컷오프(2026-01) 이후 버전은 반드시 재확인. 아래는 방향 초안.
# 원칙: restart:unless-stopped(UGOS 월례 재시작 대비) · TZ=Asia/Seoul · 포트포워딩 금지(Tailscale 전용)
name: agent-backbone

services:
  postgres:
    image: pgvector/pgvector:pg16          # pgvector 포함 (Qdrant 대신 pgvector로 시작 — C3)
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
      TZ: Asia/Seoul
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro   # 최초 1회만 실행됨
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # 포트 미노출 — 컨테이너 이름 'postgres'로만 접근 (C6 IP 안정화)

  n8n:
    image: n8nio/n8n:1.NN.N                 # ← 설치 시 현재 안정판으로 핀 (BREAKING-CHANGES 확인)
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_DATABASE: ${PG_DB}
      DB_POSTGRESDB_USER: ${PG_USER}
      DB_POSTGRESDB_PASSWORD: ${PG_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}   # ★ 별도 백업 필수(없으면 크리덴셜 복구 불가)
      GENERIC_TIMEZONE: Asia/Seoul
      TZ: Asia/Seoul
      N8N_HOST: ${N8N_HOST}                 # Tailscale MagicDNS 호스트네임 (IP 하드코딩 금지)
      N8N_PROTOCOL: http
      N8N_PORT: "5678"
      N8N_DIAGNOSTICS_ENABLED: "false"      # 텔레메트리 off
      N8N_RUNNERS_ENABLED: "true"           # 태스크 러너(권장)
    volumes:
      - ./data/n8n:/home/node/.n8n
    ports:
      - "5678:5678"                         # Tailscale 내부 전용 — 공유기 포트포워딩 금지

  litellm:
    image: ghcr.io/berriai/litellm:main-stable   # ← 설치 시 특정 버전으로 핀(메모리릭 이력)
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: ["--config", "/app/config.yaml", "--num_workers", "1"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY}
      DATABASE_URL: postgresql://${PG_USER}:${PG_PASSWORD}@postgres:5432/${PG_DB}   # 예산·키관리 UI 활성
      TZ: Asia/Seoul
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    mem_limit: 1g                           # 메모리릭 방어(주기 재시작은 restart 정책이 커버)
    ports:
      - "4000:4000"

  uptime-kuma:
    image: louislam/uptime-kuma:1           # NAS 안에서 '컨테이너·플로우' 감시 (NAS 자체는 외부 클라우드 모니터가 감시)
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul
    volumes:
      - ./data/kuma:/app/data
    ports:
      - "3001:3001"

# 매매 엔진(python-kis)은 커스텀 코드라 D7에 별도 서비스로 추가(격리 컨테이너, GD-1).
# 백업 데몬(pg_dump→restic→B2)은 D5에 추가.
